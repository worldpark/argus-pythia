# Spring Boot WAS compose (argus + pythia)
# Prerequisite: bring up infra compose files first so that the external networks
# monitoring-argus-net (kafka/postgres/redis) and monitoring-prometheus-net (prometheus/grafana) exist.
#   docker compose -f docker/docker-compose.infra.yml up -d   # 한 번에 (권장)
# 또는 개별 기동:
#   docker compose -f docker/kafka/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.postgres.yml up -d
#   docker compose -f docker/redis/docker-compose.yml up -d
#   docker compose -f docker/prometheus/docker-compose.yml up -d
#
# depends_on is intentionally NOT used: the dependent services (kafka, postgres,
# prometheus) live in separate compose files and cannot be referenced as
# depends_on targets. Container startup ordering relies on the application's
# own retry behavior together with `restart: unless-stopped`.

services:
  monitoring-argus:
    build:
      context: ../../argus
      dockerfile: Dockerfile
    image: was-argus:latest
    container_name: monitoring-argus
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      # Spring Boot relaxed-binding overrides for container DNS
      SPRING_KAFKA_BOOTSTRAP_SERVERS: monitoring-kafka:29092
      PROMETHEUS_BASE_URL: http://monitoring-prometheus:9090
      REDIS_HOST: monitoring-redis
      REDIS_PORT: 6379
      TZ: Asia/Seoul
    networks:
      - monitoring-argus-net
      - monitoring-prometheus-net
    restart: unless-stopped

  monitoring-pythia:
    build:
      context: ../../pythia
      dockerfile: Dockerfile
    image: was-pythia:latest
    container_name: monitoring-pythia
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Spring Boot relaxed-binding overrides for container DNS / secrets
      SPRING_DATASOURCE_URL: jdbc:postgresql://monitoring-postgres:5432/pythia
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: monitoring-kafka:29092
      REDIS_HOST: monitoring-redis
      REDIS_PORT: 6379
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY}
      TZ: Asia/Seoul
    networks:
      - monitoring-argus-net
    restart: unless-stopped

networks:
  monitoring-argus-net:
    external: true
    name: monitoring-argus-net
  monitoring-prometheus-net:
    external: true
    name: monitoring-prometheus-net
