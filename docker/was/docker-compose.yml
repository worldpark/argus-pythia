# Spring Boot WAS compose (argus + pythia)
# Prerequisite: bring up infra compose files first so that the external networks
# argus-net (kafka/postgres) and prometheus-net (prometheus/grafana) exist.
#   docker compose -f docker/kafka/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.postgres.yml up -d
#   docker compose -f docker/prometheus/docker-compose.yml up -d
#
# depends_on is intentionally NOT used: the dependent services (kafka, postgres,
# prometheus) live in separate compose files and cannot be referenced as
# depends_on targets. Container startup ordering relies on the application's
# own retry behavior together with `restart: unless-stopped`.

services:
  argus:
    build:
      context: ../../argus
      dockerfile: Dockerfile
    image: was-argus:latest
    container_name: argus
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      # Spring Boot relaxed-binding overrides for container DNS
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PROMETHEUS_BASE_URL: http://prometheus:9090
      TZ: Asia/Seoul
    networks:
      - argus-net
      - prometheus-net
    restart: unless-stopped

  pythia:
    build:
      context: ../../pythia
      dockerfile: Dockerfile
    image: was-pythia:latest
    container_name: pythia
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Spring Boot relaxed-binding overrides for container DNS / secrets
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pythia
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY}
      TZ: Asia/Seoul
    networks:
      - argus-net
    restart: unless-stopped

networks:
  argus-net:
    external: true
    name: argus-net
  prometheus-net:
    external: true
    name: prometheus-net
