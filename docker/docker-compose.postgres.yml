services:
  monitoring-postgres:
    image: postgres:16-alpine
    container_name: monitoring-postgres
    ports:
      - "12005:5432"
    environment:
      POSTGRES_DB: pythia
      POSTGRES_USER: pythia
      POSTGRES_PASSWORD: pythia
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pythia -d pythia"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - monitoring-argus-net

networks:
  monitoring-argus-net:
    name: monitoring-argus-net
    driver: bridge

volumes:
  postgres_data:
    name: postgres_data
