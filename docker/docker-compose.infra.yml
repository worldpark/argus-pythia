# 인프라 통합 진입 파일 (kafka + postgres + redis + prometheus/grafana)
#
# 개별 컴포넌트 파일을 include 로 묶어 한 번에 기동한다. 각 파일은 그대로
# 단독 기동도 가능하다(중복 정의 없음). 앱(argus/pythia)은 라이프사이클이
# 다르므로 was/docker-compose.yml 로 분리 유지한다.
#
# 한 번에 기동:
#   docker compose -f docker/docker-compose.infra.yml up -d
# kafka-ui 까지 포함:
#   docker compose -f docker/docker-compose.infra.yml --profile ui up -d
#
# include 의 상대경로는 이 파일(docker/) 기준이며, 각 포함 파일 내부의
# 상대경로(예: prometheus 의 ./prometheus.yml)는 해당 파일 위치 기준으로
# 그대로 해석된다.
include:
  - kafka/docker-compose.yml
  - docker-compose.postgres.yml
  - redis/docker-compose.yml
  - prometheus/docker-compose.yml
