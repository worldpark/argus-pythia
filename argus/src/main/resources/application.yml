spring:
  application:
    name: argus
  threads:
    virtual:
      enabled: true
  main:
    keep-alive: true
  kafka:
    bootstrap-servers: localhost:12002
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:12004}
      timeout: ${REDIS_TIMEOUT:2000ms}

prometheus:
  base-url: http://localhost:12000

argus:
  kafka:
    topic:
      metrics-raw: jvm.metrics.raw
      http-metrics-raw: http.metrics.raw
      hikari-metrics-raw: hikari.metrics.raw
  buffer:
    ttl: PT5M
    max-size: 5000
    overflow-policy: DROP_OLDEST
    drain-batch-size: 50
    drain-interval-ms: 5000
    key-prefix: "argus:buffer:"
  scheduling:
    enabled: true
  concurrency:
    prometheus:
      permits: 4
      acquire-timeout: 200ms
      max-attempts: 3
    kafka-publish:
      permits: 8
      acquire-timeout: 100ms
      max-attempts: 3
server:
  port: 80
