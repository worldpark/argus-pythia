name: Claude Plan

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  plan:
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@claude plan')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Use the plan agent.

            현재 GitHub Issue의 요구사항을 분석하라.
            코드는 수정하지 마라.
            PR도 생성하지 마라.

            issue 댓글로 다음 내용을 작성하라:
            - 요구사항 요약
            - 구현 범위
            - 수정 예상 파일
            - 구현 순서
            - 테스트 방법
            - 위험 요소
            - 승인 명령어: @claude implement