name: Claude Fix

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude fix')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Use the fixer agent.

            현재 PR의 리뷰 댓글과 사용자 수정 요청을 반영하라.
            기존 PR 브랜치에 필요한 수정만 적용하라.
            수정 후 요약 댓글을 남겨라.