spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:h2:mem:pythia;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  ai:
    openai:
      api-key: test-dummy
      chat:
        options:
          model: gpt-4.1-mini
          temperature: 0.2

pythia:
  kafka:
    listener:
      auto-startup: false
    dedup:
      ttl: 24h
  email:
    from: test@example.com
    operator-recipients:
      - test@example.com
  ai:
    max-response-chars: 5000

resilience4j:
  retry:
    instances:
      emailSender:
        max-attempts: 3
        wait-duration: 10ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.mail.MailException
        ignore-exceptions:
          - java.lang.InterruptedException
      llmAnalysis:
        max-attempts: 3
        wait-duration: 10ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.ai.retry.TransientAiException
        ignore-exceptions:
          - com.example.pythia.ai.exception.AiAnalysisException
      violationLock:
        max-attempts: 3
        wait-duration: 10ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - com.example.pythia.alert.exception.LockAcquisitionRetryException
        ignore-exceptions:
          - java.lang.InterruptedException
  circuitbreaker:
    instances:
      llmAnalysis:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 100ms
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.example.pythia.ai.exception.AiAnalysisException
