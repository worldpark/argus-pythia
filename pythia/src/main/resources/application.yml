spring:
  application:
    name: pythia
  jackson:
    time-zone: Asia/Seoul
  datasource:
    url: jdbc:postgresql://localhost:12005/pythia
    username: ${DB_USERNAME:pythia}
    password: ${DB_PASSWORD:pythia}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:12002
    consumer:
      group-id: pythia
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:12004}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
      lettuce:
        shutdown-timeout: 200ms
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4.1-mini
          temperature: 0.2

pythia:
  kafka:
    topic:
      jvm-metrics-raw: jvm.metrics.raw
      http-metrics-raw: http.metrics.raw
      hikari-metrics-raw: hikari.metrics.raw
    dedup:
      ttl: 24h
  email:
    from: ${MAIL_USERNAME}
    operator-recipients:
      - ${MAIL_USERNAME}
#      - ops@example.com
  alert:
    analysis-window: 10m
    violation-state:
      ttl: 1h
      key-prefix: "pythia:alert:violation:"
      lock-key-prefix: "pythia:alert:violation:lock:"
      lock-wait: 200ms
      lock-lease: 3s
  ai:
    max-response-chars: 5000
  threshold:
    jvm:
      cpu-usage-percent:
        warning: 70
        critical: 85
        consecutive: 3
      heap-usage-percent:
        warning: 75
        critical: 90
        consecutive: 2
      old-gen-usage-percent:
        warning: 80
        critical: 90
        consecutive: 2
      gc-avg-pause-seconds:
        warning: 0.2
        critical: 0.5
        consecutive: 1
      gc-count:
        warning: 10
        critical: 30
        consecutive: 1
      thread-active-count:
        warning: 200
        critical: 500
        consecutive: 2
      thread-peak-count:
        warning: 300
        critical: 800
        consecutive: 1
      thread-daemon-count:
        warning: 200
        critical: 500
        consecutive: 2
    http:
      p99-response-seconds:
        warning: 1.0
        critical: 3.0
        consecutive: 2
      error-rate-percent:
        warning: 1.0
        critical: 5.0
        consecutive: 2
    hikari:
      active-connections:
        warning: 8
        critical: 10
        consecutive: 2
      pending-connections:
        warning: 1
        critical: 5
        consecutive: 1
      usage-ratio-percent:
        warning: 80
        critical: 95
        consecutive: 2

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized

resilience4j:
  retry:
    instances:
      emailSender:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.mail.MailException
        ignore-exceptions:
          - java.lang.InterruptedException
      llmAnalysis:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.ai.retry.TransientAiException
        ignore-exceptions:
          - com.example.pythia.ai.exception.AiAnalysisException
      violationLock:
        max-attempts: 3
        wait-duration: 50ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - com.example.pythia.alert.exception.LockAcquisitionRetryException
        ignore-exceptions:
          - java.lang.InterruptedException
  circuitbreaker:
    instances:
      llmAnalysis:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.example.pythia.ai.exception.AiAnalysisException
